<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vị trí bất động sản</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', {
            zoomControl: true,
            dragging: true,
            scrollWheelZoom: false   // prevent scroll-inside-scroll conflicts in NestedScrollView
        }).setView([10.8231, 106.6297], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        var marker = null;

        // Called by PropertyDetailActivity after page load with real coordinates
        window.showLocation = function(lat, lng, title) {
            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lng], { draggable: false })
                .bindPopup('<b>' + (title || 'Bất động sản') + '</b>')
                .addTo(map);

            map.setView([lat, lng], 15);
            marker.openPopup();
        };
    </script>
</body>
</html>
